# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 3
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant = 
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Q, exec, $mainTerminal
bind = $mainMod SHIFT, RETURN, exec, ~/.local/bin/start-heavy-apps
bind = $mainMod, X, closewindow, activewindow
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, SPACE, exec, caelestia shell drawers toggle launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = SUPER, L, exec, caelestia shell lock lock

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot a region
bind = , Print, exec, hyprshot -m region -o ~/Pictures/Screenshots
# Screenshot active window
bind = SUPER, Print, exec, hyprshot -m window -o ~/Pictures/Screenshots
# Screenshot monitor
bind = SUPER SHIFT, Print, exec, hyprshot -m output -o ~/Pictures/Screenshots

bind = , XF86Presentation, exec, ~/scripts/we-wallpaper.sh
bind = SUPER, I, exec, zen-browser
bind = SUPER, W, exec, ~/.local/bin/toggle-weebcentral-panel
##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

# Keep maximize requests enabled. Suppressing them globally was interfering
# with Steam and game fullscreen/maximize behavior.

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = steam-glass

    match:class = ^(steam)$

    border_size = 0
    rounding = 14
    force_rgbx = true
    opacity = 1.0 override 1.0 override 1.0 override
}

windowrule {
    name = steam-workspace-3

    match:class = ^(steam)$

    workspace = 3 silent
}

windowrule {
    name = discord-workspace-2

    match:class = ^(discord|vesktop)$

    workspace = 2 silent
}

windowrule {
    name = discord-glass

    match:class = ^(discord|vesktop)$

    border_size = 0
    rounding = 14
    opacity = 0.9 override 0.82 override
}

windowrule {
    name = zen-glass

    match:class = ^(zen)$

    border_size = 0
    rounding = 14
    opacity = 0.90 override 0.82 override
}

windowrule {
    name = thunar-glass

    match:class = ^(thunar)$

    border_size = 0
    rounding = 14
    opacity = 0.96 override 0.92 override
}

windowrule {
    name = zen-workspace-2

    match:class = ^(zen)$

    workspace = 2 silent
}

windowrule {
    name = steam-games-fullscreen

    match:class = ^steam_app_[0-9]+$

    fullscreen_state = 2 2
    content = game
    border_size = 0
    rounding = 0
    force_rgbx = true
    opacity = 1.0 override 1.0 override 1.0 override
    no_anim = true
    no_blur = true
    no_shadow = true
    immediate = true
    sync_fullscreen = true
}

windowrule {
    name = reported-games-fullscreen

    match:content = 3

    fullscreen_state = 2 2
    border_size = 0
    rounding = 0
    force_rgbx = true
    opacity = 1.0 override 1.0 override 1.0 override
    no_anim = true
    no_blur = true
    no_shadow = true
    immediate = true
    sync_fullscreen = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Vesktop voice overlay, provided by Overlayed.
windowrule {
    name = overlayed-vesktop-vc-overlay

    match:class = ^(overlayed)$

    float = yes
    pin = true
    no_initial_focus = true
    no_focus = true
    no_follow_mouse = true
    no_anim = true
    no_blur = true
    no_shadow = true
    render_unfocused = true
    border_size = 0
    rounding = 10
    opacity = 0.92 override 0.92 override
    size = 360 132
    move = monitor_w-390 monitor_h-170
}

windowrule {
    name = core-manga-shell-panel

    match:title = ^(Core Manga Panel)$

    float = yes
    border_size = 0
    rounding = 14
    opacity = 1.0 override 1.0 override
}

# Legacy SCP-079 Tk window placement kept disabled now that the shell popout owns the UI.
