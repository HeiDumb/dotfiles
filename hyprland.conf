# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################



# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_QPA_PLATFORM,wayland
env = XCURSOR_THEME,nier-cursors-bin
env = XCURSOR_SIZE,28
env = XCURSOR_PATH,/home/hei/.icons:/home/hei/.local/share/icons:/usr/share/icons
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

cursor {
    no_hardware_cursors = true
}

exec-once = hyprctl setcursor nier-cursors-bin 28
exec-once = gsettings set org.gnome.desktop.interface cursor-theme "nier-cursors-bin"
exec-once = gsettings set org.gnome.desktop.interface cursor-size 28
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Papirus-Dark"

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = systemctl --user start hyprland-session.target
################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
monitor=eDP-1,1920x1080@165,0x0,1.0


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$mainTerminal = ~/.local/bin/main-terminal
$fileManager = thunar
$menu = hyprlauncher


#################
### AUTOSTART ###
#################

# Caelestia + Hyprlock together
exec-once = bash -lc 'exec ~/.local/bin/start-caelestia-lock'

# Disabled because the wrapper starts qs itself
# exec-once = qs -c caelestia
# exec-once = bash -lc 'sleep 1; exec ~/.local/bin/start-caelestia'
exec-once = bash -lc 'sleep 2; exec ~/scripts/auto-wallpaper.sh'
exec-once = bash -lc 'sleep 2; systemctl --user restart system-theme-sync.service >/dev/null 2>&1'
exec-once = bash -lc 'hyprctl plugin load ~/.config/hypr/plugins/voiddeck-effects/build/libvoiddeck_effects.so >/dev/null 2>&1 || true'
exec-once = bash -lc 'sleep 2; systemctl --user restart hypr-game-focus-mode.service >/dev/null 2>&1'
exec-once = bash -lc 'sleep 3; exec nm-applet'
exec-once = [workspace 1 silent] $mainTerminal
## Disabled for lower idle RAM usage; launch manually when needed.
# exec-once = [workspace 2] vesktop
## Disabled for faster login and lower background overhead; launch manually when needed.
# exec-once = bash -lc 'sleep 4; pgrep -x overlayed >/dev/null 2>&1 || exec overlayed'
## Disabled for lower idle RAM usage; launch manually when needed.
# exec-once = [workspace 2] zen-browser
## Disabled for faster login and lower background overhead; launch manually when needed.
# exec-once = steam -silent

