#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 3

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(ffffffff) rgba(000000ff) rgba(ffffffff) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Allow tearing globally; it only engages for windows that explicitly opt in.
    allow_tearing = true

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 0.74
    inactive_opacity = 0.6

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 1
        passes = 1

        vibrancy = 0.1696
    }
}

source = ~/.config/hypr/dynamic-border.conf
# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = true

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = smoothOut,      0.16, 1,    0.3,  1
    bezier = smoothIn,       0.7,  0,    0.84, 0
    bezier = smoothInOut,    0.65, 0,    0.35, 1
    bezier = softOut,        0.22, 1,    0.36, 1
    bezier = softInOut,      0.37, 0,    0.63, 1
    bezier = linear,         0,    0,    1,    1
    bezier = spin,	     0.5,  0.5,  0.5,  0.5

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     6,     smoothInOut
    animation = border,        1,     2,     linear
    animation = borderangle,   1,     90,     linear,       loop
    animation = windows,       1,     5.2,   smoothOut
    animation = windowsIn,     1,     2.0,   smoothOut,    popin 90%
    animation = windowsOut,    1,     1.0,   smoothIn,     popin 90%
    animation = fadeIn,        1,     3.2,   softOut
    animation = fadeOut,       1,     1.1,   smoothIn
    animation = fade,          1,     3.4,   softInOut
    animation = layers,        1,     4.8,   smoothOut
    animation = layersIn,      1,     4.4,   smoothOut,    fade
    animation = layersOut,     1,     3.2,   smoothIn,     fade
    animation = fadeLayersIn,  1,     3.2,   softOut
    animation = fadeLayersOut, 1,     2.4,   smoothIn
    animation = workspaces,    1,     4.2,   smoothInOut,  fade
    animation = workspacesIn,  1,     4,     smoothInOut,  fade
    animation = workspacesOut, 1,     4,     smoothInOut,  fade
    animation = zoomFactor,    1,     6,     smoothOut
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
